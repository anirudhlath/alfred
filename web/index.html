<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1612">
    <title>Alfred</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-rule"></div>
            <div class="header-content">
                <h1>Alfred</h1>
                <div class="header-meta">
                    <span id="status" class="status">
                        <span class="status-indicator"></span>
                        <span class="status-label">Connecting</span>
                    </span>
                </div>
            </div>
            <div class="header-rule"></div>
        </header>

        <main id="chat-log">
            <div class="welcome-message">
                <p class="welcome-salutation">Good evening, sir.</p>
                <p class="welcome-body">How may I be of assistance?</p>
            </div>
        </main>

        <footer>
            <div class="input-container">
                <textarea id="chat-input" placeholder="Speak or type your request..." rows="1" autocomplete="off"></textarea>
                <div class="input-actions">
                    <button id="voice-btn" class="btn-icon" title="Push to talk" aria-label="Push to talk">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                    <button id="send-btn" class="btn-icon" title="Send" aria-label="Send message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
